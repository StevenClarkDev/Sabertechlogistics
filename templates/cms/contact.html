{% extends "base.html" %}

{% block content %}
<section class="page-hero">
    {% if page.eyebrow %}<p class="eyebrow">{{ page.eyebrow }}</p>{% endif %}
    <h1>{{ page.title }}</h1>
    {% if page.subtitle %}<p class="lead">{{ page.subtitle }}</p>{% endif %}
</section>

<section class="content-section contact-layout">
    {% if page.body %}<div class="rich-text">{{ page.body|safe }}</div>{% endif %}
    <form class="contact-form" method="post">
        {% csrf_token %}
        <label>
            Name
            <input name="name" type="text" required>
        </label>
        <label>
            Email
            <input name="email" type="email" required>
        </label>
        <label>
            Message
            <textarea name="message" rows="7" required></textarea>
        </label>
        <button class="button" type="submit">Submit</button>
    </form>
</section>
{% endblock %}
